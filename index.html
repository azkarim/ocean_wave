<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Ocean Waves</title>
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <meta name="theme-color" content="#00838f" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <link rel="manifest" href="manifest.json" />
        <link rel="apple-touch-icon" href="icon-192.png" />
        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                background-color: #222;
                overflow: hidden;
                touch-action: none;
            }
        </style>
    </head>
    <body>
        <div id="app"></div>

        <script src="elm.js"></script>
        <script>
            // Retrieve high score from localStorage
            const storageKey = "ocean-waves-high-score";
            const savedScore = localStorage.getItem(storageKey);

            // Prepare flags for Elm
            const flags = {
                highestLevel: savedScore ? parseFloat(savedScore) : 20.0,
            };

            // Initialize the Elm app
            const app = Elm.Main.init({
                node: document.getElementById("app"),
                flags: flags,
            });

            // Listen for the saveHighestLevel port
            if (app.ports && app.ports.saveHighestLevel) {
                app.ports.saveHighestLevel.subscribe(function (score) {
                    localStorage.setItem(storageKey, score);
                });
            }

            // Register Service Worker for PWA/Offline support
            if ("serviceWorker" in navigator) {
                window.addEventListener("load", function () {
                    navigator.serviceWorker.register("./sw.js").then(
                        function (registration) {
                            console.log(
                                "ServiceWorker registration successful with scope: ",
                                registration.scope,
                            );
                        },
                        function (err) {
                            console.log(
                                "ServiceWorker registration failed: ",
                                err,
                            );
                        },
                    );
                });
            }
        </script>
    </body>
</html>
